<!DOCTYPE html>
<html>
<head>
  <title>Game Tebak Angka</title>
</head>
<body>

  <h1>Game Tebak Angka</h1>
  <p>Tebak angka dari 1 sampai 10</p>

  <input type="number" id="input">
  <button onclick="cek()">Cek</button>

  <p id="hasil"></p>
  <p id="skor">Skor: 0</p>

  <script>
    let angka = Math.floor(Math.random() * 10) + 1;
    let skor = 0;

    function cek() {
      let input = document.getElementById("input").value;

      if (input == angka) {
        skor++;
        document.getElementById("hasil").innerHTML = "Benar!";
        document.getElementById("skor").innerHTML = "Skor: " + skor;
        angka = Math.floor(Math.random() * 10) + 1;
      } else if (input > angka) {
        document.getElementById("hasil").innerHTML = "Terlalu besar!";
      } else {
        document.getElementById("hasil").innerHTML = "Terlalu kecil!";
      }
    }
  </script>

</body>
</html>
